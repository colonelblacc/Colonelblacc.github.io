<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Systems Skill Tree</title>
    <style>
        :root {
            --bg-page: #121212;
            --poster-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --ink: #ffffff;
            --fill-color: #61dafb;
            --hex-w: 130px;
            --hex-h: 150px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: var(--bg-page); color: var(--text-main); display: flex; justify-content: center; padding: 20px; }

        .poster {
            background-color: var(--poster-bg);
            border: 4px solid var(--text-main);
            padding: 40px;
            width: 1150px;
            min-width: 1150px;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: var(--ink); font-size: 4rem; text-transform: uppercase; }

        .grid-container { position: relative; width: 1000px; height: 1550px; margin-left: 80px; }
        .hex-wrap { position: absolute; width: var(--hex-w); height: var(--hex-h); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); background: var(--text-main); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .hex-inner { width: 124px; height: 144px; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); background: var(--poster-bg); display: flex; align-items: center; justify-content: center; padding: 10px; text-align: center; }
        .hex-wrap.completed .hex-inner { background: var(--fill-color); color: #000; }
        .hex-text { font-size: 0.65rem; font-weight: bold; }

        .footer { margin-top: 50px; display: flex; justify-content: space-between; border-top: 2px solid var(--text-main); padding-top: 20px; }
        input { background: transparent; border: none; border-bottom: 1px solid var(--text-main); color: var(--text-main); padding: 5px; }
    </style>
</head>
<body>
    <div class="poster">
        <div class="header"><h1>Embedded Systems</h1></div>
        <div class="grid-container" id="grid"></div>
        <div class="footer">
            <div>Name: <input type="text" id="username" placeholder="Type here..."></div>
            <div>Sync ID: <input type="text" id="syncIdInput" maxlength="6"> <button id="syncBtn">Load</button></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCoRF9ocNSBioKic-I2DJ7aEtPssDg0E7w",
            authDomain: "embeddedskilltree.firebaseapp.com",
            projectId: "embeddedskilltree",
            storageBucket: "embeddedskilltree.firebasestorage.app",
            messagingSenderId: "882992766556",
            appId: "1:882992766556:web:2cd846309e8af0a3f35099"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const auth = getAuth();
        
        const hexMap = [
            { c: 0, r: 1, text: "Trace debugging" },
            { c: 3, r: 9, text: "Get an Arduino" }
        ];

        let appData = { progress: {}, username: '' };
        const urlParams = new URLSearchParams(window.location.search);
        let currentSyncId = urlParams.get('syncId') || Math.random().toString(36).substring(2, 8).toUpperCase();
        document.getElementById('syncIdInput').value = currentSyncId;

        onAuthStateChanged(auth, async (user) => {
            if (!user) await signInAnonymously(auth);
            onSnapshot(doc(db, 'skilltrees', currentSyncId), (s) => {
                appData = s.exists() ? s.data() : { progress: {}, username: '' };
                document.getElementById('username').value = appData.username || '';
                updateUI();
            });
        });

        function updateUI() {
            hexMap.forEach((item, i) => {
                const id = `hex_${i}`;
                const el = document.getElementById(id);
                if (el) el.className = 'hex-wrap' + (appData.progress[id] ? ' completed' : '');
            });
        }

        hexMap.forEach((item, i) => {
            const hexWrap = document.createElement('div');
            const id = `hex_${i}`;
            hexWrap.id = id;
            hexWrap.className = 'hex-wrap';
            hexWrap.style.left = `${item.c * 97.5}px`;
            hexWrap.style.top = `${item.r * 150 + (item.c % 2 === 0 ? 75 : 0)}px`;
            hexWrap.innerHTML = `<div class="hex-inner"><div class="hex-text">${item.text}</div></div>`;
            hexWrap.onclick = () => {
                appData.progress[id] = !appData.progress[id];
                setDoc(doc(db, 'skilltrees', currentSyncId), appData, { merge: true });
            };
            document.getElementById('grid').appendChild(hexWrap);
        });

        document.getElementById('syncBtn').onclick = () => {
            window.location.href = `?syncId=${document.getElementById('syncIdInput').value}`;
        };
    </script>
</body>
</html>
